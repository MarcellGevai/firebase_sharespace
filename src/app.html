<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />

		<!-- PWA Meta Tags -->
		<link rel="manifest" href="%sveltekit.assets%/manifest.json" />
		<meta name="theme-color" content="#0f172a" />
		<link rel="icon" href="%sveltekit.assets%/icon.svg" type="image/svg+xml" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/icon.svg" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="ShareSpace" />
		<!--
			Must run before first paint, and therefore before hydration: otherwise a
			dark-mode user gets a white flash every navigation. No stored choice means
			follow the OS; storing one pins it. Kept inline and dependency-free so it
			can't be delayed by a network fetch.
		-->
		<script>
			try {
				var t = localStorage.getItem('theme');
				if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
					document.documentElement.classList.add('dark');
				}
			} catch (e) {
				/* private mode / storage blocked: fall through to light */
			}
		</script>
		<style>
			/* Wait for Phase 3 for complex background-blending/masking */
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
