<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />

		<!-- PWA Meta Tags -->
		<link rel="manifest" href="%sveltekit.assets%/manifest.json" />
		<meta name="theme-color" content="#0f172a" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/old-icon.svg" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="ShareSpace" />
		<!--
			Must run before first paint, and therefore before hydration: otherwise a
			dark-mode user gets a white flash every navigation. No stored choice means
			follow the OS; storing one pins it. Kept inline and dependency-free so it
			can't be delayed by a network fetch.
		-->
		<script>
			try {
				var t = localStorage.getItem('theme');
				if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
					document.documentElement.classList.add('dark');
				}
			} catch (e) {
				/* private mode / storage blocked: fall through to light */
			}
		</script>
		<style>
			#sharespace-splash {
				position: fixed;
				inset: 0;
				z-index: 9999;
				display: flex;
				align-items: center;
				justify-content: center;
				background: linear-gradient(135deg, #34d399 0%, #059669 50%, #064e3b 100%);
				transition: opacity 400ms ease-in-out;
			}

			#sharespace-splash.splash-fade-out {
				opacity: 0;
				pointer-events: none;
			}

			@keyframes pulse {
				0%, 100% {
					opacity: 1;
					transform: scale(1);
				}
				50% {
					opacity: 0.7;
					transform: scale(0.95);
				}
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div id="sharespace-splash">
			<img src="%sveltekit.assets%/icon.svg" alt="ShareSpace" style="width: 120px; height: 120px; animation: pulse 2s infinite;" />
		</div>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
