<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />

		<!-- PWA Meta Tags -->
		<link rel="manifest" href="%sveltekit.assets%/manifest.json" />
		<meta name="theme-color" content="#0f172a" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/gemini-icon.svg" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="ShareSpace" />
		<!--
			Must run before first paint, and therefore before hydration: otherwise a
			dark-mode user gets a white flash every navigation. No stored choice means
			follow the OS; storing one pins it. Kept inline and dependency-free so it
			can't be delayed by a network fetch.
		-->
		<script>
			try {
				var t = localStorage.getItem('theme');
				if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
					document.documentElement.classList.add('dark');
				}
			} catch (e) {
				/* private mode / storage blocked: fall through to light */
			}
		</script>
		<style>
			#sharespace-splash {
				position: fixed;
				inset: 0;
				z-index: 9999;
				display: flex;
				align-items: center;
				justify-content: center;
				background-color: #0f172a;
				transition: opacity 0.4s ease-out;
			}
			#sharespace-splash.splash-fade-out {
				opacity: 0;
				pointer-events: none;
			}
			.splash-content {
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 1.5rem;
			}
			.splash-ring {
				width: 64px;
				height: 64px;
				border-radius: 50%;
				border: 2px solid #F59E0B;
				animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
			}
			@keyframes pulse-ring {
				0% { transform: scale(0.8); opacity: 0.5; }
				50% { transform: scale(1.2); opacity: 1; }
				100% { transform: scale(0.8); opacity: 0.5; }
			}
			.splash-text {
				font-family: ui-sans-serif, system-ui, sans-serif;
				letter-spacing: 0.1em;
				text-transform: uppercase;
				color: #10B981;
				font-size: 1.125rem;
				font-weight: 400;
				animation: fade-in 1s ease-out forwards;
				opacity: 0;
			}
			@keyframes fade-in {
				to { opacity: 1; }
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div id="sharespace-splash">
			<div class="splash-content">
				<div class="splash-ring"></div>
				<h1 class="splash-text">ShareSpace</h1>
			</div>
		</div>
		<div style="display: contents">%sveltekit.body%</div>
		<script>
			if ('serviceWorker' in navigator) {
				window.addEventListener('load', () => {
					navigator.serviceWorker.register('/sw.js').catch(err => {
						console.error('Service worker registration failed:', err);
					});
				});
			}
		</script>
	</body>
</html>
