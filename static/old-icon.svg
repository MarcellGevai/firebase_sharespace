<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Dark slate premium background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <!-- Brand Green Gradient -->
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e" />
      <stop offset="100%" stop-color="#15803d" />
    </linearGradient>

    <!-- Amber Gold Gradient -->
    <linearGradient id="amberGradient" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#d97706" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    
    <!-- Subtle drop shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)" />

  <!-- Logo Graphics: Modern "S" overlapping shapes -->
  <g filter="url(#shadow)" transform="translate(256, 256)">
    <!-- Top Arc (Amber Gold) -->
    <path 
      d="M 64 -96 A 96 96 0 0 0 -96 -96 L -96 -32 A 32 32 0 0 1 64 -32 Z" 
      fill="url(#amberGradient)" 
      transform="rotate(0)" 
    />
    <path 
      d="M -32 -96 L 64 -96 A 32 32 0 0 1 96 -64 L 96 32 A 32 32 0 0 1 -32 32 Z" 
      fill="url(#amberGradient)"
      opacity="0.9"
    />
    
    <!-- Bottom Arc (Brand Green) -->
    <path 
      d="M -64 96 A 96 96 0 0 0 96 96 L 96 32 A 32 32 0 0 1 -64 32 Z" 
      fill="url(#greenGradient)" 
      transform="rotate(0)" 
    />
    <path 
      d="M 32 96 L -64 96 A 32 32 0 0 1 -96 64 L -96 -32 A 32 32 0 0 1 32 -32 Z" 
      fill="url(#greenGradient)"
      opacity="0.9"
    />

    <!-- Overlapping center intersection to create an 'S' flow -->
    <path 
      d="M -32 -32 L 32 -32 A 32 32 0 0 1 64 0 A 32 32 0 0 1 32 32 L -32 32 A 32 32 0 0 1 -64 0 A 32 32 0 0 1 -32 -32 Z"
      fill="url(#greenGradient)"
    />
    
    <circle cx="0" cy="0" r="32" fill="#0f172a" />
  </g>
</svg>
